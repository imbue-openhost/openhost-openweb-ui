[app]
name = "openweb-ui"
version = "0.1.0"
description = "Open WebUI on OpenHost"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"

[resources]
memory_mb = 2048
cpu_millicores = 1000

[data]
app_data = true
# Holds the regenerable model cache (embedding/whisper/tiktoken). Not backed up.
app_temp_data = true
